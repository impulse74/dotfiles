[window]
padding = { x = 2, y = 2 }
dynamic_padding = true

[scrolling]
history = 2000

[font]
normal = { family = "firacodenerdfont", style = "regular" }
size = 12.0

# Solarized Dark - Official Palette
[colors]

[colors.primary]
background = "#002b36"
foreground = "#839496"

[colors.cursor]
text = "#002b36"
cursor = "#839496"

[colors.normal]
black   = "#073642"
red     = "#dc322f"
green   = "#859900"
yellow  = "#b58900"
blue    = "#268bd2"
magenta = "#d33682"
cyan    = "#2aa198"
white   = "#eee8d5"

[colors.bright]
black   = "#002b36"
red     = "#cb4b16"
green   = "#586e75"
yellow  = "#657b83"
blue    = "#839496"
magenta = "#6c71c4"
cyan    = "#93a1a1"
white   = "#fdf6e3"

[cursor]
style = { shape = "Block", blinking = "Off" }

[keyboard]
bindings = [{key = "X", mods = "Control | Shift", chars = "\u2660"}]
